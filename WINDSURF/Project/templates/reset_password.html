<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset Password - InSpectra</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@400;700;900&family=Arimo:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/globals.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="auth-body">

  <div class="auth-bg">
    <div class="auth-blob auth-blob-1"></div>
    <div class="auth-blob auth-blob-2"></div>
    <div class="auth-blob auth-blob-3"></div>
  </div>

  <div class="auth-layout">

    <div class="auth-brand">
      <img class="auth-logo" src="{{ url_for('static', filename='images/Rectangle 6.png') }}" alt="InSpectra" />
      <h1 class="auth-brand-title">InSpectra</h1>
      <p class="auth-brand-sub">Automated EL Inspection System<br>for Photovoltaic Solar Panels</p>
    </div>

    <div class="auth-card">
      <div class="auth-card-icon">
        <i class="fa-solid fa-shield-halved"></i>
      </div>
      <h2 class="auth-card-title">Reset Password</h2>
      <p class="auth-card-sub">Enter your OTP and choose a new password.</p>

      {% if success %}
      <div class="auth-success">
        <i class="fa-solid fa-circle-check"></i> Password reset! <a href="{{ url_for('login') }}">Sign in now.</a>
      </div>
      {% endif %}

      <form method="POST" action="{{ url_for('reset_password') }}" class="auth-form">
        <div class="auth-field">
          <label for="otp">One-Time Password (OTP)</label>
          <div class="auth-input-wrap">
            <i class="fa-solid fa-hashtag"></i>
            <input type="text" id="otp" name="otp" placeholder="Enter OTP from email" required />
          </div>
        </div>

        <div class="auth-field">
          <label for="new_password">New Password</label>
          <div class="auth-input-wrap">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="new_password" name="new_password" placeholder="Enter new password" required />
          </div>
        </div>

        <div class="auth-field">
          <label for="confirm_password">Confirm New Password</label>
          <div class="auth-input-wrap">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm new password" required />
          </div>
        </div>

        <button type="submit" class="auth-btn-primary">
          <i class="fa-solid fa-rotate"></i> Reset Password
        </button>
      </form>

      <div class="auth-footer-link">
        <a href="{{ url_for('login') }}"><i class="fa-solid fa-arrow-left"></i> Back to Sign In</a>
      </div>
    </div>

  </div>

</body>
</html>
