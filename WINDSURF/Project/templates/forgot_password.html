<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Forgot Password - InSpectra</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@400;700;900&family=Arimo:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/globals.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="auth-body">

  <div class="auth-bg">
    <div class="auth-blob auth-blob-1"></div>
    <div class="auth-blob auth-blob-2"></div>
    <div class="auth-blob auth-blob-3"></div>
  </div>

  <div class="auth-layout">

    <div class="auth-brand">
      <img class="auth-logo" src="{{ url_for('static', filename='images/Rectangle 6.png') }}" alt="InSpectra" />
      <h1 class="auth-brand-title">InSpectra</h1>
      <p class="auth-brand-sub">Automated EL Inspection System<br>for Photovoltaic Solar Panels</p>
    </div>

    <div class="auth-card">
      <div class="auth-card-icon">
        <i class="fa-solid fa-key"></i>
      </div>
      <h2 class="auth-card-title">Forgot Password?</h2>
      <p class="auth-card-sub">Enter your registered email and we will send you a reset OTP.</p>

      {% if sent %}
      <div class="auth-success">
        <i class="fa-solid fa-circle-check"></i> OTP sent! Check your inbox.
      </div>
      {% endif %}

      <form method="POST" action="{{ url_for('forgot_password') }}" class="auth-form">
        <div class="auth-field">
          <label for="email">Email Address</label>
          <div class="auth-input-wrap">
            <i class="fa-solid fa-envelope"></i>
            <input type="email" id="email" name="email" placeholder="inspector@inspectra.com" required />
          </div>
        </div>

        <button type="submit" class="auth-btn-primary">
          <i class="fa-solid fa-paper-plane"></i> Send Reset OTP
        </button>
      </form>

      <div class="auth-footer-link">
        <a href="{{ url_for('login') }}"><i class="fa-solid fa-arrow-left"></i> Back to Sign In</a>
      </div>
    </div>

  </div>

</body>
</html>
