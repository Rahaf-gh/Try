{% extends "base.html" %}

{% block title %}Home - InSpectra{% endblock %}

{% block content %}
<div class="home-interface">

  <!-- Background decorative blobs -->
  <div class="home-blob home-blob-1"></div>
  <div class="home-blob home-blob-2"></div>
  <div class="home-blob home-blob-3"></div>

  <!-- Wavy background SVG -->
  <svg class="home-wave" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320" preserveAspectRatio="none">
    <path fill="#ffffff05" d="M0,160L60,170.7C120,181,240,203,360,197.3C480,192,600,160,720,149.3C840,139,960,149,1080,165.3C1200,181,1320,203,1380,213.3L1440,224L1440,320L1380,320C1320,320,1200,320,1080,320C960,320,840,320,720,320C600,320,480,320,360,320C240,320,120,320,60,320L0,320Z"/>
    <path fill="#ffffff08" d="M0,224L60,213.3C120,203,240,181,360,186.7C480,192,600,224,720,234.7C840,245,960,235,1080,218.7C1200,203,1320,181,1380,170.7L1440,160L1440,320L1380,320C1320,320,1200,320,1080,320C960,320,840,320,720,320C600,320,480,320,360,320C240,320,120,320,60,320L0,320Z"/>
  </svg>

  <!-- Main content card -->
  <div class="home-card">

    <!-- Greeting -->
    <div class="home-greeting">
      <p class="home-greeting-sub">Hello, Inspector</p>
      <h1 class="home-greeting-title">Welcome Back!</h1>
    </div>

    <!-- Stats row -->
    <div class="home-stats">
      <div class="home-stat-card">
        <div class="home-stat-icon"><i class="fa-solid fa-clipboard-list"></i></div>
        <div class="home-stat-info">
          <span class="home-stat-value">3</span>
          <span class="home-stat-label">Total Inspections</span>
        </div>
      </div>
      <div class="home-stat-card">
        <div class="home-stat-icon home-stat-icon--high"><i class="fa-solid fa-triangle-exclamation"></i></div>
        <div class="home-stat-info">
          <span class="home-stat-value">1</span>
          <span class="home-stat-label">High Risk</span>
        </div>
      </div>
      <div class="home-stat-card">
        <div class="home-stat-icon home-stat-icon--ok"><i class="fa-solid fa-circle-check"></i></div>
        <div class="home-stat-info">
          <span class="home-stat-value">2</span>
          <span class="home-stat-label">Low / Moderate</span>
        </div>
      </div>
    </div>

    <!-- CTA Button -->
    <div class="home-cta">
      <a href="{{ url_for('history') }}" class="home-btn-secondary">
        <i class="fa-solid fa-clock-rotate-left"></i> View History
      </a>
      <button class="home-btn-primary">
        <i class="fa-solid fa-plus"></i> Start New Inspection
      </button>
    </div>

  </div>

</div>
{% endblock %}
